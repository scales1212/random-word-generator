<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Improv Word Generator</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header>
    <h1>Improv Word Generator</h1>
    <p>Pick a category, then generate a word for your scene.</p>
  </header>

  <main>
    <div id="category-bar" role="group" aria-label="Word categories"></div>

    <button id="generate-btn" type="button">Generate Word</button>

    <div id="result-container" aria-live="polite" aria-label="Generated word">
      <span id="result"></span>
    </div>
  </main>

  <footer>
    <p>Improv Word Generator &mdash; open source</p>
  </footer>

  <!-- 1. Data files (each sets a WORDS_* global) -->
  <script src="data/places.js"></script>
  <script src="data/transportation.js"></script>
  <script src="data/food.js"></script>
  <script src="data/objects.js"></script>
  <script src="data/animals.js"></script>
  <script src="data/occupations.js"></script>
  <script src="data/emotions.js"></script>
  <script src="data/actions.js"></script>
  <script src="data/characters.js"></script>
  <script src="data/timePeriods.js"></script>
  <!-- 2. Manifest assembles WORD_LISTS from the globals above -->
  <script src="src/wordLists.js"></script>
  <!-- 3. Core logic, then UI wiring -->
  <script src="src/generator.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
